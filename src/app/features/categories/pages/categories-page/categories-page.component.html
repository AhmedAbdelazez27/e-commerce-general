<div class="container py-4 categories-page">
  <app-catalog-breadcrumb [items]="breadcrumbs" />

  <header class="categories-page__head mb-4">
    <h1 class="h2 mb-1">{{ 'PAGE.CATEGORIES' | translate }}</h1>
    <p class="text-muted mb-0">{{ 'CATEGORIES.PAGE_SUBTITLE' | translate }}</p>
  </header>

  @if (loading()) {
    <p class="text-muted">{{ 'COMMON.LOADING' | translate }}</p>
  } @else if (loadFailed()) {
    <div class="alert alert-warning mb-0">{{ 'CATEGORIES.LOAD_FAILED' | translate }}</div>
  } @else {
    <div class="categories-page__grid">
      @for (cat of categories(); track cat.id) {
        <app-category-tile
          [imageUrl]="imageUrl(cat)"
          [name]="name(cat)"
          [description]="description(cat)"
          [count]="cat.count"
          [isFeatured]="cat.isFeatured"
          [route]="shopRoute"
          [queryParams]="shopQuery(cat)"
        />
      }
    </div>
  }
</div>
