<div class="container py-5" style="max-width: 28rem">
 
  <div class="d-flex justify-content-between align-items-center mb-3">
     <h1 class="h2 mb-0">{{ 'PAGE.LOGIN' | translate }}</h1>
     <div class="d-flex justify-content-end gap-2 ">
    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="setLang('en')">EN</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="setLang('ar')" style="padding-top: 0;">ع</button>
  </div>
 
  </div>

  <div class="login-box shadow">
    <div class="mb-4">
  <label for="exampleFormControlInput1" class="form-label">Email address</label>
  <input type="email" class="form-control form-login" id="exampleFormControlInput1" placeholder="Enter Email">
</div>
<div class="mb-4">
  <label for="exampleFormControlInput1" class="form-label">Password</label>
  <input type="password" class="form-control form-login" id="exampleFormControlInput1" placeholder="Enter Password">
</div>

<button class="btn btn-login mb-4">
  Login
</button>

<div class="d-flex justify-content-between mb-4">
<div class="">
  <a href="#">Forgot Password?</a>
</div>
<div class="form-check">
  <input class="form-check-input" type="checkbox" value="" id="checkDefault">
  <label class="form-check-label" for="checkDefault">
    Remember me
  </label>
</div>
</div>

<div class="text-center">
  <a href="#"> Create New Account</a>
</div>

  </div>

</div>
