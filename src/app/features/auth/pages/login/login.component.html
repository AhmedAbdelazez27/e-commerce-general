<div class="container py-5" style="max-width: 28rem">
  <div class="d-flex justify-content-end gap-2 mb-3">
    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="setLang('en')">
      {{ 'LAYOUT.LANG_EN' | translate }}
    </button>
    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="setLang('ar')">
      {{ 'LAYOUT.LANG_AR' | translate }}
    </button>
  </div>

  <h1 class="h3 mb-4">{{ 'AUTH.TITLE' | translate }}</h1>

  <form (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label" for="login-user">{{ 'AUTH.USERNAME' | translate }}</label>
      <input
        id="login-user"
        name="username"
        class="form-control"
        [(ngModel)]="username"
        autocomplete="username"
        [placeholder]="'AUTH.USERNAME_PH' | translate"
      />
    </div>
    <div class="mb-3">
      <label class="form-label" for="login-pass">{{ 'AUTH.PASSWORD' | translate }}</label>
      <input
        id="login-pass"
        name="password"
        type="password"
        class="form-control"
        [(ngModel)]="password"
        autocomplete="current-password"
        [placeholder]="'AUTH.PASSWORD_PH' | translate"
      />
    </div>
    <div class="mb-3 form-check">
      <input class="form-check-input" type="checkbox" id="remember" name="remember" [(ngModel)]="rememberMe" />
      <label class="form-check-label" for="remember">{{ 'AUTH.REMEMBER' | translate }}</label>
    </div>
    <button type="submit" class="btn btn-primary w-100" [disabled]="submitting">
      {{ 'AUTH.SUBMIT' | translate }}
    </button>
  </form>

  <p class="mt-3 text-center">
    <a routerLink="/auth/register">{{ 'AUTH.REGISTER' | translate }}</a>
  </p>
</div>
