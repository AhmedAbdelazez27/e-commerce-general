<div class="home-page home-page--viewport">
  <app-home-hero [config]="config.hero" class="row"/>

  @if (config.curatedCollections; as curated) {
    <app-home-curated-collections [config]="curated" />
  }

  <app-home-category-shortcuts />

  @for (section of config.productSections; track section.id) {
    <app-home-product-section
      [section]="section"
      [products]="productsForSection(section.id)"
    />
  }

  <app-home-offers [offers]="config.offers" />

  <app-home-brands [config]="config.brands" />

  <app-home-trust-badges [badges]="config.trustBadges" />
</div>
