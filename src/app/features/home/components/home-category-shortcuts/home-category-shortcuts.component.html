@if (loading() || hasCategories()) {
  <section class="home-section" aria-labelledby="home-categories-title">
    <app-section-header
      titleKey="HOME.CATEGORIES.TITLE"
      subtitleKey="HOME.CATEGORIES.SUBTITLE"
      viewAllRoute="/categories"
    />

    @if (loading()) {
      <p class="text-muted mb-0">{{ 'COMMON.LOADING' | translate }}</p>
    } @else {
      <ul class="home-categories">
        @for (cat of categories(); track cat.id) {
          <li>
            <app-category-tile
              [imageUrl]="cat.imageUrl"
              [name]="categoryName(cat)"
              [description]="categoryDescription(cat)"
              [count]="cat.productCount"
              [isFeatured]="cat.isFeatured"
              [route]="cat.route"
              [queryParams]="cat.queryParams"
              variant="default"
            />
          </li>
        }
      </ul>
    }
  </section>
}
