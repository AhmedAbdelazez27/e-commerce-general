<section class="home-section" [attr.aria-labelledby]="'home-section-' + section().id">
  <app-section-header
    [titleKey]="section().titleKey"
    [subtitleKey]="section().subtitleKey"
    [viewAllRoute]="section().viewAllRoute"
    [viewAllQuery]="section().viewAllQuery"
  />

  @if (section().layout === 'scroll') {
    <div class="home-product-rail" role="list">
      @for (product of cardProducts(); track product.id) {
        <div class="home-product-rail__item" role="listitem">
          <app-product-card
            [product]="product"
            (productClick)="onProductClick($event)"
            (addToCart)="onAddToCart($event)"
            (addToWishlist)="onAddToWishlist($event)"
            (quickView)="onQuickView($event)"
          />
        </div>
      }
    </div>
  } @else {
    <div class="home-product-grid">
      @for (product of cardProducts(); track product.id) {
        <app-product-card
          [product]="product"
          (productClick)="onProductClick($event)"
          (addToCart)="onAddToCart($event)"
          (addToWishlist)="onAddToWishlist($event)"
          (quickView)="onQuickView($event)"
        />
      }
    </div>
  }
</section>
