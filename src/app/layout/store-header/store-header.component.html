<header class="store-header">
  <div class="ds-container store-header__inner">
    <button
      type="button"
      class="store-header__menu-btn"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-controls="store-mobile-drawer"
      (click)="openMenu()"
    >
      <span class="ds-visually-hidden">{{ 'LAYOUT.HEADER.OPEN_MENU' | translate }}</span>
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>

    <a class="store-header__logo" [routerLink]="branding.homeRoute">
      <img [src]="branding.logoSrc" [alt]="branding.logoAltKey | translate" width="160" height="40" />
    </a>

    <form class="store-header__search store-header__search--inline" (submit)="submitSearch($event)" role="search">
      <div class="store-header__search-wrap">
        <input
          type="search"
          class="store-header__search-input"
          name="q"
          [(ngModel)]="searchQuery"
          [placeholder]="header.searchPlaceholderKey | translate"
          autocomplete="off"
        />
        <button type="submit" class="store-header__search-btn" [attr.aria-label]="'LAYOUT.HEADER.SEARCH' | translate">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        </button>
      </div>
    </form>

    <div class="store-header__actions">
      <div class="store-header__lang" role="group" [attr.aria-label]="'LAYOUT.HEADER.LANGUAGE' | translate">
        <button
          type="button"
          [class.is-active]="currentLang() === 'ar'"
          (click)="setLang('ar')"
        >
          ع
        </button>
        <button
          type="button"
          [class.is-active]="currentLang() === 'en'"
          (click)="setLang('en')"
        >
          EN
        </button>
      </div>

      <a class="store-header__action" [routerLink]="accountRoute()">
        <i class="fa-regular fa-user" aria-hidden="true"></i>
        <span class="store-header__action-label">
          @if (isLoggedIn() && accountLabel()) {
            {{ accountLabel() }}
          } @else {
            {{ accountLabelKey() | translate }}
          }
        </span>
      </a>

      <a
        class="store-header__action"
        [routerLink]="header.wishlistRoute"
        [attr.aria-label]="'LAYOUT.HEADER.WISHLIST' | translate"
      >
        <i class="fa-regular fa-heart" aria-hidden="true"></i>
        <span class="store-header__action-label">{{ 'LAYOUT.HEADER.WISHLIST' | translate }}</span>
      </a>

      <a
        class="store-header__action"
        [routerLink]="header.cartRoute"
        [attr.aria-label]="'LAYOUT.HEADER.CART' | translate"
      >
        <i class="fa-solid fa-bag-shopping" aria-hidden="true"></i>
        @if (itemCount() > 0) {
          <span class="store-header__cart-badge" aria-hidden="true">{{ itemCount() > 99 ? '99+' : itemCount() }}</span>
        }
        <span class="store-header__action-label">{{ 'LAYOUT.HEADER.CART' | translate }}</span>
      </a>
    </div>
  </div>

  <div class="ds-container store-header__tablet-search">
    <form class="store-header__search" (submit)="submitSearch($event)" role="search">
      <div class="store-header__search-wrap">
        <input
          type="search"
          class="store-header__search-input"
          name="q-tablet"
          [(ngModel)]="searchQuery"
          [placeholder]="header.searchPlaceholderKey | translate"
          autocomplete="off"
        />
        <button type="submit" class="store-header__search-btn" [attr.aria-label]="'LAYOUT.HEADER.SEARCH' | translate">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        </button>
      </div>
    </form>
  </div>
</header>
