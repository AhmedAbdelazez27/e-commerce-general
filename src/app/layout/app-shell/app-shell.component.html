<div
  class="store-shell"
  [class.store-shell--has-announcement]="hasAnnouncement"
  [class.store-shell--home-viewport]="isHomeViewport()"
  [class.store-shell--scrolled]="isScrolled()"
>
  <!-- Announcement bar hidden per request -->
  <!-- <app-announcement-bar /> -->

  <div class="store-chrome">
    <app-store-header
      [mobileMenuOpen]="mobileDrawerOpen()"
      (openMobileMenu)="openMobileDrawer()"
    />

    <app-store-nav />
  </div>

  <app-mobile-nav-drawer [open]="mobileDrawerOpen()" (closed)="closeMobileDrawer()" />

  <main class="store-shell__main">
    <div class="ds-container">
      <router-outlet />
    </div>
  </main>

  <app-store-footer />
</div>
