<div class="store-shell" [class.store-shell--has-announcement]="hasAnnouncement">
  <app-announcement-bar />

  <app-store-header
    [mobileMenuOpen]="mobileDrawerOpen()"
    (openMobileMenu)="openMobileDrawer()"
  />

  <app-store-nav />

  <app-mobile-nav-drawer [open]="mobileDrawerOpen()" (closed)="closeMobileDrawer()" />

  <main class="store-shell__main">
    <div class="ds-container">
      <router-outlet />
    </div>
  </main>

  <app-store-footer />
</div>
