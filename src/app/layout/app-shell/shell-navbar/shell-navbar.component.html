<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-0">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/home">{{ 'LAYOUT.BRAND' | translate }}</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#storeNavbar"
      aria-controls="storeNavbar"
      aria-expanded="false"
      [attr.aria-label]="'LAYOUT.NAV_MENU_TOGGLE' | translate"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="storeNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            {{ 'LAYOUT.NAV_HOME' | translate }}
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/shop" routerLinkActive="active">{{ 'LAYOUT.NAV_SHOP' | translate }}</a>
        </li>
        <li class="nav-item">
          <a class="nav-link position-relative" routerLink="/cart" routerLinkActive="active">
            {{ 'LAYOUT.NAV_CART' | translate }}
            @if (cart.itemCount() > 0) {
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger">
                {{ cart.itemCount() }}
              </span>
            }
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
